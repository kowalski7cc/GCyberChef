---
app-id: xyz.kowalski7cc.GCyberChef
runtime: org.gnome.Platform
runtime-version: "50"
branch: stable
sdk: org.gnome.Sdk
command: xyz.kowalski7cc.GCyberChef
finish-args:
  - "--share=ipc"
  - "--socket=fallback-x11"
  - "--socket=wayland"
  - "--device=dri"

cleanup:
  - "/include"
  - "/lib/pkgconfig"
  - "/share/pkgconfig"
  - "/share/aclocal"
  - "/man"
  - "/share/man"
  - "/share/gtk-doc"
  - "/share/vala"
  - "*.la"
  - "*.a"
modules:
  - name: cyberchef
    buildsystem: simple
    build-commands:
      - |
        mkdir -p $FLATPAK_DEST/share/cyberchef/
        unzip CyberChef.zip -d $FLATPAK_DEST/share/cyberchef/
        ln -s $FLATPAK_DEST/share/cyberchef/CyberChef_*.html $FLATPAK_DEST/share/cyberchef/index.html
    sources:
      - type: file
        url: https://github.com/gchq/CyberChef/releases/download/v11.2.0/CyberChef_d358d82cbcb269d764a2deb598a37043bd054f45.zip
        sha256: 9abbe74b94af3423b4e0e6d064cf5142df01c5e89d6b222e412fd6f4daf906ac
        dest-filename: CyberChef.zip
  - name: gcyberchef
    buildsystem: meson
    sources:
      - type: dir
        path: .
build-options:
  env: {}
